name: Lint Workflows

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yaml"
  pull_request:
    paths:
      - ".github/workflows/**"
      - ".github/actionlint.yaml"

permissions:
  contents: read

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Lint GitHub workflows
        run: |
          bash <(curl https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) v1.7.12
          ./actionlint -color
        shell: bash
